# Mirror main branch and tags to Codeberg after every push to GitHub.
# Keeps https://codeberg.org/ljh-sh/roff in sync automatically.
#
# Token: CODEBERG_TOKEN secret (Codeberg access token with write:repository).
# Auth: embedded in remote URL (https://user:token@codeberg.org/...).
name: Mirror to Codeberg

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0   # need full history + tags

      - name: Configure Codeberg remote
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote add codeberg "https://ljh-sh:${CODEBERG_TOKEN}@codeberg.org/ljh-sh/roff.git"

      - name: Push main + tags
        run: |
          # Push the currently checked-out commit to Codeberg main. This works
          # for both branch pushes (HEAD == main) and tag pushes (HEAD == tag).
          git push codeberg HEAD:main --force
          git push codeberg --tags --force
