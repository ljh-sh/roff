name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          # toolchain channel is pinned in rust-toolchain.toml for reproducible builds (#24)
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke test CLI
        run: |
          ./target/release/roff --version
          echo '.TH TEST 1
          .SH NAME
          test \\- a test program' | ./target/release/roff tojson --

  bench-smoke:
    name: Benchmark smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        # toolchain channel is pinned in rust-toolchain.toml for reproducible builds (#24)

      - name: Install man-db
        run: sudo apt-get update && sudo apt-get install -y man-db

      - name: Build
        run: cargo build --release --locked

      - name: Run benchmark on local man pages
        run: ./target/release/roff bench --count 50
