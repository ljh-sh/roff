<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/install' | relative_url }}">Install</a>
        <a href="{{ '/subcommands' | relative_url }}">Commands</a>
        <a href="{{ '/design' | relative_url }}">Design</a>
        <a href="{{ '/why' | relative_url }}">Why</a>
        <a href="{{ '/faq' | relative_url }}">FAQ</a>
        <a href="{{ '/alternatives' | relative_url }}">Alternatives</a>
        <a href="https://github.com/ljh-sh/roff" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <article class="page-content">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>roff is open source under <a href="https://github.com/ljh-sh/roff/blob/main/LICENSE" target="_blank" rel="noopener">Apache 2.0</a>.</p>
    </div>
  </footer>
</body>
</html>
